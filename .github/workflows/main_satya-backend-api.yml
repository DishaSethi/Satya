name: Build and deploy Python app to Azure Web App - satya-backend-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Virtual Environment and Install Dependencies
        working-directory: ./backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install --no-cache-dir --only-binary=:all: -r requirements.txt

      - name: Zip the backend artifact for deployment
        working-directory: ./backend
        run: zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D9B76A108AC94F66889BAE08AA211D98 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A86F5CC0323846CE95960B8B8AB51FD1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4DF4DCC919CC417FB24F189AFF5FA83C }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'satya-backend-api'
          slot-name: 'Production'
          package: release.zip